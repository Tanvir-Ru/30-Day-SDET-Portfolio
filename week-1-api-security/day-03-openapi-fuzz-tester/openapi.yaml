openapi: "3.1.0"

info:
  title: Sample Vulnerable API
  version: "1.0.0"
  description: Test target for OpenAPI fuzz testing

servers:
  - url: http://localhost:8000

paths:
  /users:
    get:
      operationId: list_users
      summary: List all users (paginated)
      tags: [users]
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:  { type: array, items: { $ref: "#/components/schemas/User" } }
                  total:  { type: integer }

    post:
      operationId: create_user
      summary: Create a new user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "422":
          description: Validation error

  /users/{user_id}:
    get:
      operationId: get_user
      summary: Get user by ID
      tags: [users]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404":
          description: User not found

    delete:
      operationId: delete_user
      summary: Delete a user
      tags: [users]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /search:
    post:
      operationId: search_users
      summary: Search users by name
      tags: [search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: "alice"
                page:
                  type: integer
                  minimum: 1
                  default: 1
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results: { type: array }
                  query:   { type: string }
                  count:   { type: integer }

  /echo:
    get:
      operationId: echo
      summary: Echo message (for testing reflection)
      tags: [debug]
      parameters:
        - name: message
          in: query
          required: true
          schema: { type: string, maxLength: 500 }
      responses:
        "200":
          description: Echoed message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:   { type: string }
                  timestamp: { type: number }

components:
  schemas:
    User:
      type: object
      properties:
        id:    { type: integer }
        name:  { type: string }
        email: { type: string, format: email }
        role:  { type: string, enum: [user, admin, moderator] }

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Alice Smith"
        email:
          type: string
          format: email
          example: "alice@example.com"
        age:
          type: integer
          minimum: 0
          maximum: 150
        role:
          type: string
          enum: [user, admin, moderator]
          default: user
